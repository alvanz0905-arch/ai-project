<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Prompt Hub by alvan zm v1</title>
<style>
body{margin:0;font-family:Arial,sans-serif;background:#0d1117;color:#fff}
header{padding:24px;background:#111827;position:sticky;top:0}
.container{max-width:1100px;margin:auto;padding:20px}
.hero{padding:30px 0}
.search{width:100%;padding:14px;border-radius:12px;border:none;background:#1f2937;color:#fff}
.chips{display:flex;gap:10px;overflow:auto;padding:15px 0}
.chip{background:#1f2937;padding:10px 16px;border-radius:999px;white-space:nowrap}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:18px}
.card{background:#161b22;padding:18px;border-radius:18px;border:1px solid #2d3748}
.badge{display:inline-block;background:#2563eb;padding:4px 10px;border-radius:999px;font-size:12px}
button{margin-top:15px;width:100%;padding:12px;border:none;border-radius:10px;background:#2563eb;color:#fff;cursor:pointer}
#toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:#16a34a;padding:12px 18px;border-radius:10px;display:none}
.bottom{position:fixed;bottom:0;left:0;right:0;background:#111827;display:flex;justify-content:space-around;padding:12px}
.bottom div{text-align:center;color:#ddd}
</style>
</head>
<body>
<header><div class="container"><h2>🤖 AI Prompt Hub</h2></div></header>
<div class="container">
<div class="hero">
<h1>Discover Amazing AI Prompts</h1>
<p>Premium prompt collection by Alvan.</p>
<input id="search" class="search" placeholder="Search prompt...">
<div class="chips">
<div class="chip">All</div><div class="chip">ChatGPT</div><div class="chip">Image</div><div class="chip">Video</div><div class="chip">Coding</div>
</div>
</div>
<div class="grid" id="grid"></div>
</div>
<div id="toast">✅ Prompt copied!</div>
<div class="bottom">
<div>🏠<br>Home</div>
<div>🔍<br>Search</div>
<div>📂<br>Category</div>
<div>❤️<br>Favorite</div>
<div>👤<br>About</div>
</div>
<script>
const prompts=[
{title:"Ultra HD Photo",badge:"POPULAR",category:"Image",desc:"4K enhancement prompt",prompt:"Ultra-high-resolution 4K enhancement based strictly on the

provided reference image.

Absolute fidelity to original facial anatomy, proportions, and identity. Preserve expression, gaze, pose, camera angle, framing, and perspective with zero deviation. Clothing, hair, skin, and background elements must remain unchanged in structure, placement, and design.

Recover fine-grain detail with natural realism. Enhance pores, fine lines, hair strands, eyelashes, fabric weave, seams, and material edges without introducing stylization. Maintain original color science, white balance, and tonal relationships exactly as captured. Lighting direction, intensity, contrast, and shadow behavior must match the source image precisely, with only improved clarity and expanded dynamic range. No relighting, no reshaping. Remove any grain.

Apply controlled sharpening and high-frequency detail reconstruction. Remove compression artifacts and noise while retaining authentic texture. No smoothing, no plastic skin, no artificial gloss. Facial features must remain consistent across the entire image with coherent anatomy and clean, stable

edges.

Negative constraints: no warping, no facial drift, no added or missing anatomy, no altered hands, no distortions, no perspective shift, no text or graphics, no hallucinated detail, no stylized rendering. Output must read as a true-to-life, photorealistic upscale that matches the reference exactly, only clearer, sharper, and higher resolution."},
{title:"Remove Object",badge:"HOT",category:"Image",desc:"Remove unwanted objects",prompt:"Remove object prompt"},
{title:"ChatGPT Expert",badge:"NEW",category:"ChatGPT",desc:"Expert assistant",prompt:"Act as an expert assistant..."}
];
const grid=document.getElementById("grid");
function render(list){
grid.innerHTML="";
list.forEach(p=>{
grid.innerHTML+=`<div class="card">
<span class="badge">${p.badge}</span>
<h3>${p.title}</h3>
<p>${p.desc}</p>
<small>${p.category}</small>
<button onclick="copyPrompt(\`${p.prompt}\`)">📋 Copy Prompt</button>
</div>`;
});
}
render(prompts);
document.getElementById("search").oninput=e=>{
const q=e.target.value.toLowerCase();
render(prompts.filter(x=>x.title.toLowerCase().includes(q)||x.category.toLowerCase().includes(q)||x.desc.toLowerCase().includes(q)));
}
function copyPrompt(t){
navigator.clipboard.writeText(t);
const x=document.getElementById("toast");
x.style.display="block";
setTimeout(()=>x.style.display="none",1800);
}
</script>
</body>
</html>
